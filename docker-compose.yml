services:
  tradingagents:
    build: .
    env_file:
      - .env
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    tty: true
    stdin_open: true
    profiles:
      - cli

  tradingagents-web:
    build: .
    entrypoint: ["tradingagents-web"]
    env_file:
      - .env
    environment:
      - TRADINGAGENTS_WEB_HOST=0.0.0.0
      - TRADINGAGENTS_WEB_PORT=8087
      - TRADINGAGENTS_WEB_RELOAD=false
    ports:
      - "8087:8087"
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    tty: true
    stdin_open: true


  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - TRADINGAGENTS_LLM_PROVIDER=ollama
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  tradingagents_data:
  ollama_data:
